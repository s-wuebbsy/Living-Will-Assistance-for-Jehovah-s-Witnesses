<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Entscheidungshilfe für Zeugen Jehovas zur Patientenverfügung – Blutverfahren und lebenserhaltende Maßnahmen. Decision guide for Jehovah's Witnesses – blood procedures and life-sustaining measures.">
<title>Patientenverfügung · Advance Directive</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── DARK MODE (default) ── */
:root {
  --bg: #0f1117; --surface: #181c27; --surface2: #1e2235; --border: #2a3050;
  --accent: #c8a96e; --danger: #e05c5c; --success: #5cb88a; --warning: #d4a843;
  --text: #e8e4dc; --text-muted: #8a8fa8; --text-dim: #555d7a;
  --ja: #1e3a28; --ja-border: #5cb88a; --nein: #3a1e1e; --nein-border: #e05c5c;
  --offen: #2e2a18; --offen-border: #d4a843;
  --shadow: 0 8px 40px rgba(0,0,0,0.5);
  --text-output-bg: #f9f7f2; --text-output-color: #1a1a1a;
}
/* ── LIGHT MODE ── */
body.light {
  --bg: #f4f2ee; --surface: #ffffff; --surface2: #f0ede8; --border: #ddd8cf;
  --accent: #a07830; --danger: #c03030; --success: #2a7a4a; --warning: #a07010;
  --text: #1a1a1a; --text-muted: #555050; --text-dim: #999090;
  --ja: #d8f0e2; --ja-border: #2a7a4a; --nein: #f5d8d8; --nein-border: #c03030;
  --offen: #faf0d0; --offen-border: #a07010;
  --shadow: 0 4px 20px rgba(0,0,0,0.12);
  --text-output-bg: #ffffff; --text-output-color: #1a1a1a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 16px; line-height: 1.65; min-height: 100vh; transition: background 0.3s, color 0.3s; }
@media (prefers-reduced-motion: no-preference) {
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(200,169,110,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(200,169,110,0.025) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  body.light::before { background-image: linear-gradient(rgba(100,80,40,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(100,80,40,0.04) 1px, transparent 1px); }
}

/* ── TOOLBAR ── */
.toolbar { position: fixed; top: 0; left: 0; right: 0; z-index: 150; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); transition: background 0.3s, border-color 0.3s; }
.toolbar-left { display: flex; align-items: center; gap: 8px; }
.toolbar-brand { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.5px; }
.toolbar-right { display: flex; align-items: center; gap: 10px; }

/* Lang switcher */
.lang-bar { display: flex; gap: 4px; background: var(--surface2); border-radius: 8px; padding: 3px; border: 1px solid var(--border); }
.lang-btn { border: none; background: transparent; color: var(--text-muted); border-radius: 5px; padding: 4px 10px; font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; }
.lang-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.lang-btn.active { background: var(--accent); color: #fff; }
body.light .lang-btn.active { color: #fff; }

/* Dark/Light toggle */
.mode-toggle { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 13px; color: var(--text-muted); font-family: 'Inter', sans-serif; transition: all 0.2s; }
.mode-toggle:hover { color: var(--text); border-color: var(--text-dim); }
.mode-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.mode-icon { font-size: 15px; }

/* ── SR-ONLY (screenreader only) ── */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

/* ── CONTAINER ── */
.container { max-width: 860px; margin: 0 auto; padding: 100px 24px 180px; position: relative; z-index: 1; }

/* ── HEADER ── */
header { text-align: center; margin-bottom: 56px; }
.header-eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; font-weight: 600; }
h1 { font-size: clamp(26px, 4.5vw, 38px); font-weight: 700; color: var(--text); line-height: 1.2; margin-bottom: 16px; white-space: pre-line; }
.header-sub { color: var(--text-muted); font-size: 16px; max-width: 580px; margin: 0 auto 28px; }
.divider { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); margin: 0 auto; }

/* ── LEGEND ── */
.legend { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 44px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot-ja { background: var(--success); } .dot-nein { background: var(--danger); }
.dot-offen { background: var(--warning); } .dot-fix { background: var(--text-dim); }

/* ── SECTION ── */
.section { margin-bottom: 48px; }
.section-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.section-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.section-title { font-size: 20px; font-weight: 700; color: var(--text); }
.section-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; margin-bottom: 10px; transition: border-color 0.2s, background 0.2s; }
.card.fixed { opacity: 0.6; }
.card.state-ja { background: var(--ja); border-color: var(--ja-border); }
.card.state-nein { background: var(--nein); border-color: var(--nein-border); }
.card.state-offen { background: var(--offen); border-color: var(--offen-border); }
.card-top { display: flex; align-items: flex-start; gap: 14px; }
.card-body { flex: 1; }
.card-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.card-desc { font-size: 15px; color: var(--text-muted); line-height: 1.6; }
.card-note { font-size: 13px; color: var(--accent); margin-top: 10px; padding: 8px 12px; background: rgba(200,169,110,0.08); border-left: 2px solid var(--accent); border-radius: 0 4px 4px 0; line-height: 1.55; }
.toggle-group { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; }

/* ── SHARED CHOICE BUTTON ── */
.choice-btn { border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; padding: 6px 14px; font-size: 14px; font-family: 'Inter', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.choice-btn:hover { border-color: var(--text-dim); color: var(--text); }
.choice-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.choice-btn.active-ja { background: var(--ja); border-color: var(--ja-border); color: var(--success); font-weight: 600; }
.choice-btn.active-nein { background: var(--nein); border-color: var(--nein-border); color: var(--danger); font-weight: 600; }
.toggle-btn { background: var(--surface2); }
.fixed-badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }

/* ── NOTICE ── */
.notice { background: rgba(200,169,110,0.07); border: 1px solid rgba(200,169,110,0.22); border-radius: 10px; padding: 14px 18px; font-size: 14px; color: var(--text-muted); margin-bottom: 36px; display: flex; gap: 12px; align-items: flex-start; line-height: 1.6; }
.notice-icon { font-size: 18px; flex-shrink: 0; }

/* ── LM CARDS ── */
.lm-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; margin-bottom: 12px; }
.lm-card-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.lm-card-desc { font-size: 15px; color: var(--text-muted); line-height: 1.6; margin-bottom: 14px; }
.lm-scenarios { display: flex; flex-direction: column; gap: 10px; }
.lm-row { display: flex; align-items: center; gap: 14px; padding: 8px 12px; border-radius: 8px; background: var(--surface2); }
.lm-label { font-size: 14px; font-weight: 600; color: var(--text); min-width: 200px; flex-shrink: 0; }
.lm-label span { font-size: 12px; font-weight: 400; color: var(--text-muted); display: block; margin-top: 1px; }
.lm-btns { display: flex; gap: 6px; margin-left: auto; }
.lm-btn { background: var(--bg); padding: 5px 14px; }

/* ── SUMMARY BOX ── */
.summary-box { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; min-width: 210px; box-shadow: var(--shadow); z-index: 100; transition: background 0.3s, border-color 0.3s; }
.summary-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; font-weight: 600; }
.summary-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; margin-bottom: 5px; gap: 16px; }
.summary-label { color: var(--text-muted); }
.summary-count { font-weight: 700; }
.count-ja { color: var(--success); } .count-nein { color: var(--danger); } .count-offen { color: var(--warning); }
.progress-bar { width: 100%; height: 6px; background: var(--surface2); border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.progress-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-align: center; }
.btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.text-btn { width: 100%; background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; }
.text-btn:hover { background: rgba(200,169,110,0.12); }
.text-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.export-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: opacity 0.2s; }
.export-btn:hover { opacity: 0.85; }
.export-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 200; align-items: center; justify-content: center; padding: 24px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; max-width: 700px; width: 100%; max-height: 88vh; overflow-y: auto; transition: background 0.3s; }
.modal h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { color: var(--text-muted); font-size: 15px; margin-bottom: 20px; line-height: 1.55; }
.tab-bar { display: flex; gap: 4px; margin-bottom: 22px; background: var(--surface2); border-radius: 10px; padding: 4px; }
.tab-btn { flex: 1; padding: 8px; border: none; background: transparent; color: var(--text-muted); font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif; border-radius: 7px; cursor: pointer; transition: all 0.2s; }
.tab-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.2); font-weight: 600; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.modal-section { margin-bottom: 20px; }
.modal-section-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
.modal-entry { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 15px; gap: 16px; }
.modal-entry:last-child { border-bottom: none; }
.modal-entry-name { color: var(--text); flex: 1; }
.modal-entry-state { font-weight: 700; font-size: 13px; white-space: nowrap; }
.state-text-ja { color: var(--success); } .state-text-nein { color: var(--danger); }
.state-text-offen { color: var(--warning); } .state-text-fix { color: var(--text-dim); }
.text-output-box { background: var(--text-output-bg); color: var(--text-output-color); border-radius: 10px; padding: 20px 24px; font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.85; white-space: pre-wrap; border: 1px solid var(--border); min-height: 180px; margin-bottom: 14px; }
.text-hint { font-size: 13px; color: var(--text-muted); background: rgba(126,184,212,0.07); border: 1px solid rgba(126,184,212,0.2); border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; line-height: 1.6; }
.warning-box { font-size: 13px; color: var(--warning); background: rgba(212,168,67,0.07); border: 1px solid rgba(212,168,67,0.25); border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; line-height: 1.6; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-btn { flex: 1; padding: 11px; border-radius: 8px; font-size: 15px; font-family: 'Inter', sans-serif; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text-muted); transition: all 0.15s; }
.modal-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal-btn:hover { opacity: 0.82; }
.modal-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.tab-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
@media (max-width: 620px) {
  .toggle-group { flex-direction: column; } .summary-box { left: 12px; right: 12px; bottom: 12px; max-height: 45vh; overflow-y: auto; }
  .card-top { flex-direction: column; } .lm-row { flex-direction: column; align-items: flex-start; }
  .lm-btns { margin-left: 0; } .lm-label { min-width: unset; }
  .toolbar { flex-wrap: wrap; } .lang-bar { flex-wrap: wrap; }
  .container { padding-bottom: 240px; }
}
@media print {
  body, body.light { background: #fff; color: #000; }
  body::before { display: none; }
  .toolbar, .summary-box, .mode-toggle, .legend, .toggle-group, .lm-btns, .fixed-badge { display: none !important; }
  .container { padding: 0; max-width: 100%; }
  .card, .lm-card { break-inside: avoid; border-color: #ccc; background: #fff; opacity: 1; }
  .card.fixed { opacity: 1; }
  .card.state-ja { background: #e8f5e9; } .card.state-nein { background: #ffebee; }
  .section-icon { border-color: #ccc; background: #f5f5f5; }
  .card-name, .section-title, .lm-card-name { color: #000; }
  .card-desc, .card-note, .section-subtitle, .lm-card-desc, .notice { color: #333; }
  .notice { background: #f9f9f9; border-color: #ddd; }
  .modal-overlay { position: static; display: block !important; background: none; padding: 0; }
  .modal { max-width: 100%; max-height: none; box-shadow: none; border: none; padding: 0; }
  .modal-actions, .tab-bar, .text-hint { display: none; }
  .tab-panel { display: block !important; }
  .text-output-box { border-color: #ccc; min-height: auto; }
  a { text-decoration: none; color: #000; }
}
</style>
</head>
<body>

<!-- ── TOOLBAR ── -->
<nav class="toolbar" aria-label="Hauptnavigation">
  <div class="toolbar-left">
    <span class="toolbar-brand">Dokument zur ärztlichen Versorgung</span>
  </div>
  <div class="toolbar-right">
    <div class="lang-bar" role="group" aria-label="Sprache wählen">
      <button class="lang-btn active" data-lang="de" aria-pressed="true" aria-label="Deutsch">DE</button>
      <button class="lang-btn" data-lang="en" aria-pressed="false" aria-label="English">EN</button>
      <button class="lang-btn" data-lang="es" aria-pressed="false" aria-label="Español">ES</button>
      <button class="lang-btn" data-lang="fr" aria-pressed="false" aria-label="Français">FR</button>
    </div>
    <button class="mode-toggle" id="mode-btn" aria-label="Farbmodus umschalten">
      <span class="mode-icon" aria-hidden="true">☀️</span>
      <span id="mode-label">Light</span>
    </button>
  </div>
</nav>

<div class="container">
  <header>
    <div class="header-eyebrow" data-i18n="eyebrow"></div>
    <h1 data-i18n="h1"></h1>
    <p class="header-sub" data-i18n="header_sub"></p>
    <div class="divider"></div>
  </header>

  <div class="notice" role="note">
    <span class="notice-icon" aria-hidden="true">ℹ️</span>
    <span data-i18n="notice_main"></span>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-ja"></div><span data-i18n="leg_accepted"></span></div>
    <div class="legend-item"><div class="legend-dot dot-nein"></div><span data-i18n="leg_rejected"></span></div>
    <div class="legend-item"><div class="legend-dot dot-offen"></div><span data-i18n="leg_open"></span></div>
  </div>

  <!-- ── SECTION 1: FREMDBLUT ── -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon" aria-hidden="true">🚫</div>
      <div>
        <div class="section-title" data-i18n="s1_title"></div>
        <div class="section-subtitle" data-i18n="s1_sub"></div>
      </div>
    </div>
    <div class="card fixed state-nein" data-id="vollblut" data-fixed="nein">
      <div class="card-top"><div class="card-body"><div class="card-name" data-i18n="vollblut_name"></div><div class="card-desc" data-i18n="vollblut_desc"></div></div><span class="fixed-badge" data-i18n="leg_rejected"></span></div>
    </div>
    <div class="card fixed state-nein" data-id="ery" data-fixed="nein">
      <div class="card-top"><div class="card-body"><div class="card-name" data-i18n="ery_name"></div><div class="card-desc" data-i18n="ery_desc"></div></div><span class="fixed-badge" data-i18n="leg_rejected"></span></div>
    </div>
    <div class="card fixed state-nein" data-id="leuko" data-fixed="nein">
      <div class="card-top"><div class="card-body"><div class="card-name" data-i18n="leuko_name"></div><div class="card-desc" data-i18n="leuko_desc"></div></div><span class="fixed-badge" data-i18n="leg_rejected"></span></div>
    </div>
    <div class="card fixed state-nein" data-id="thrombo" data-fixed="nein">
      <div class="card-top"><div class="card-body"><div class="card-name" data-i18n="thrombo_name"></div><div class="card-desc" data-i18n="thrombo_desc"></div></div><span class="fixed-badge" data-i18n="leg_rejected"></span></div>
    </div>
    <div class="card fixed state-nein" data-id="plasma-fremd" data-fixed="nein">
      <div class="card-top"><div class="card-body"><div class="card-name" data-i18n="plasma_name"></div><div class="card-desc" data-i18n="plasma_desc"></div></div><span class="fixed-badge" data-i18n="leg_rejected"></span></div>
    </div>
  </div>

  <!-- ── SECTION 2: EIGENBLUT ── -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon" aria-hidden="true">🩸</div>
      <div>
        <div class="section-title" data-i18n="s2_title"></div>
        <div class="section-subtitle" data-i18n="s2_sub"></div>
      </div>
    </div>
    <div class="notice" role="note" style="margin-bottom:20px;"><span class="notice-icon" aria-hidden="true">📺</span><span id="s2-notice"></span></div>

    <div class="card" data-id="haemo" data-state="offen">
      <div class="card-top">
        <div class="card-body"><div class="card-name" data-i18n="haemo_name"></div><div class="card-desc" data-i18n="haemo_desc"></div></div>
        <div class="toggle-group" role="group" aria-label="Entscheidung"><button class="choice-btn toggle-btn" data-action="toggle" data-value="ja" data-i18n-ja aria-pressed="false"></button><button class="choice-btn toggle-btn" data-action="toggle" data-value="nein" data-i18n-nein aria-pressed="false"></button></div>
      </div>
    </div>
    <div class="card" data-id="cellsalvage" data-state="offen">
      <div class="card-top">
        <div class="card-body"><div class="card-name" data-i18n="cellsalvage_name"></div><div class="card-desc" data-i18n="cellsalvage_desc"></div></div>
        <div class="toggle-group" role="group" aria-label="Entscheidung"><button class="choice-btn toggle-btn" data-action="toggle" data-value="ja" data-i18n-ja aria-pressed="false"></button><button class="choice-btn toggle-btn" data-action="toggle" data-value="nein" data-i18n-nein aria-pressed="false"></button></div>
      </div>
    </div>
    <div class="card" data-id="hlm" data-state="offen">

    txt_blutspar: 'Mesures d\'économie de sang',
    txt_lm: 'Mesures de maintien en vie',
    txt_ja: 'Je consens à', txt_nein: 'Je refuse', txt_offen: 'Pas encore décidé [EN ATTENTE]',
    txt_blutspar_detail: 'Je demande expressément des techniques d\'économie de sang : solutés de remplissage, perfusions de fer et protocole de prélèvement minimal.',
    txt_closing: 'Ces instructions complètent le point 2 et s\'appliquent en toutes circonstances.',
    sc_labels: { s1: 'Bonnes perspectives de guérison', s2: 'Aucune perspective d\'amélioration', s3: 'Phase terminale' },
    fix_nein_label: 'Refusé (sang allogénique)', fix_ja_label: 'Toujours accepté (aucun produit sanguin)',
    accepted_label: 'Accepté', rejected_label: 'Refusé', open_label: 'En attente',
    btn_reset: 'Réinitialiser', progress: '{done} sur {total} décidés',
  }
};
</script>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const EIGENBLUT_IDS = ['haemo','cellsalvage','hlm','dialyse','plasmapherese','markierung','epiblut'];
const FRAKTION_IDS = ['albumin','immunglobuline','gerinnungsfaktoren','haemoglobin','epo','prp'];

let currentLang = 'de';
let isDark = true;
const states = {};
const lmStates = {};

// ══════════════════════════════════════════
// I18N
// ══════════════════════════════════════════
function t(key) { return T[currentLang][key] || T['de'][key] || key; }

function applyTranslations() {
  const lang = T[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (lang[key] !== undefined) el.textContent = lang[key];
  });
  document.querySelectorAll('[data-i18n-ja]').forEach(el => el.textContent = lang.yes || 'Ja');
  document.querySelectorAll('[data-i18n-nein]').forEach(el => el.textContent = lang.no || 'Nein');
  document.getElementById('mode-label').textContent = isDark ? lang.mode_light : lang.mode_dark;
  document.querySelector('.toolbar-brand').textContent = lang.eyebrow;

  // S2 notice with dynamic link
  const s2Notice = document.getElementById('s2-notice');
  if (s2Notice && lang.s2_notice) {
    const url = 'https://www.jw.org/de/bibliothek/videos/#' + currentLang + '/mediaitems/StudioFeatured/docid-1112024049_1_VIDEO';
    const html = lang.s2_notice
      .replace('{link_start}', '<a href="' + url + '" target="_blank" rel="noopener noreferrer" style="color:var(--accent);text-decoration:underline">')
      .replace('{link_end}', '</a>');
    s2Notice.innerHTML = html;
  }

  rebuildLMCards();
  updateCounts();
}

function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    const isActive = b.textContent === lang.toUpperCase();
    b.classList.toggle('active', isActive);
    b.setAttribute('aria-pressed', isActive);
  });
  applyTranslations();
  persistState();
}

// ══════════════════════════════════════════
// DARK / LIGHT MODE
// ══════════════════════════════════════════
function toggleMode() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  const btn = document.getElementById('mode-btn');
  btn.querySelector('.mode-icon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('mode-label').textContent = isDark ? t('mode_light') : t('mode_dark');
  persistState();
}

// ══════════════════════════════════════════
// LM CARD BUILDER
// ══════════════════════════════════════════
function rebuildLMCards() {
  const lang = T[currentLang];
  const container = document.getElementById('lm-cards-container');
  if (!container) return;
  container.innerHTML = '';
  const fragment = document.createDocumentFragment();

  (lang.lm_items || []).forEach(item => {
    const st = lmStates[item.id] || {};
    const scenarios = [
      { key: 's1', label: lang.sc_s1, sub: lang.sc_s1_sub },
      { key: 's2', label: lang.sc_s2, sub: lang.sc_s2_sub },
      { key: 's3', label: lang.sc_s3, sub: lang.sc_s3_sub },
    ];

    const card = document.createElement('div');
    card.className = 'lm-card';
    card.dataset.lmId = item.id;

    const cardName = document.createElement('div');
    cardName.className = 'lm-card-name';
    cardName.textContent = item.name;
    card.appendChild(cardName);

    const cardDesc = document.createElement('div');
    cardDesc.className = 'lm-card-desc';
    cardDesc.textContent = item.desc;
    card.appendChild(cardDesc);

    const scenariosContainer = document.createElement('div');
    scenariosContainer.className = 'lm-scenarios';

    scenarios.forEach(sc => {
      const v = st[sc.key] || 'offen';

      const row = document.createElement('div');
      row.className = 'lm-row';

      const label = document.createElement('div');
      label.className = 'lm-label';
      label.textContent = sc.label;
      const subSpan = document.createElement('span');
      subSpan.textContent = sc.sub;
      label.appendChild(subSpan);
      row.appendChild(label);

      const btns = document.createElement('div');
      btns.className = 'lm-btns';
      btns.setAttribute('role', 'group');
      btns.setAttribute('aria-label', sc.label);

      const jaBtn = document.createElement('button');
      jaBtn.className = 'choice-btn lm-btn' + (v === 'ja' ? ' active-ja' : '');
      jaBtn.textContent = lang.yes;
      jaBtn.setAttribute('aria-pressed', String(v === 'ja'));
      jaBtn.addEventListener('click', function() { setLM(item.id, sc.key, 'ja', this); });
      btns.appendChild(jaBtn);

      const neinBtn = document.createElement('button');
      neinBtn.className = 'choice-btn lm-btn' + (v === 'nein' ? ' active-nein' : '');
      neinBtn.textContent = lang.no;
      neinBtn.setAttribute('aria-pressed', String(v === 'nein'));
      neinBtn.addEventListener('click', function() { setLM(item.id, sc.key, 'nein', this); });
      btns.appendChild(neinBtn);

      row.appendChild(btns);
      scenariosContainer.appendChild(row);
    });

    card.appendChild(scenariosContainer);
    fragment.appendChild(card);
  });

  container.appendChild(fragment);
}

// ══════════════════════════════════════════
// BLOOD STATE
// ══════════════════════════════════════════
function setState(id, value, btn) {
  const card = document.querySelector(`[data-id="${id}"]`);
  if (states[id] === value) {
    states[id] = 'offen';
    card.className = 'card state-offen';
    card.querySelectorAll('.toggle-btn').forEach(b => {
      b.classList.remove('active-ja','active-nein');
      b.setAttribute('aria-pressed', 'false');
    });
  } else {
    states[id] = value;
    card.className = `card state-${value}`;
    card.querySelectorAll('.toggle-btn').forEach(b => {
      b.classList.remove('active-ja','active-nein');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add(`active-${value}`);
    btn.setAttribute('aria-pressed', 'true');
  }
  updateCounts();
  persistState();
}

function setLM(id, scenario, value, btn) {
  if (!lmStates[id]) lmStates[id] = {};
  if (lmStates[id][scenario] === value) {
    lmStates[id][scenario] = 'offen';
    btn.classList.remove('active-ja','active-nein');
    btn.setAttribute('aria-pressed', 'false');
  } else {
    lmStates[id][scenario] = value;
    btn.parentElement.querySelectorAll('.lm-btn').forEach(b => {
      b.classList.remove('active-ja','active-nein');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add(`active-${value}`);
    btn.setAttribute('aria-pressed', 'true');
  }
  updateCounts();
  persistState();
}

function updateCounts() {
  const items = document.querySelectorAll('[data-id][data-state]');
  let ja = 0, nein = 0, offen = 0;
  items.forEach(card => {
    const s = states[card.dataset.id] || 'offen';
    if (s === 'ja') ja++; else if (s === 'nein') nein++; else offen++;
  });
  const lmIds = (T[currentLang].lm_items || []).map(x => x.id);
  lmIds.forEach(id => {
    ['s1','s2','s3'].forEach(sc => {
      const v = (lmStates[id] || {})[sc] || 'offen';
      if (v === 'ja') ja++; else if (v === 'nein') nein++; else offen++;
    });
  });
  document.getElementById('count-ja').textContent = ja;
  document.getElementById('count-nein').textContent = nein;
  document.getElementById('count-offen').textContent = offen;

  // Progress bar
  const total = ja + nein + offen;
  const done = ja + nein;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  const tmpl = t('progress') || '{done} / {total}';
  document.getElementById('progress-label').textContent = tmpl.replace('{done}', done).replace('{total}', total);
}

// ══════════════════════════════════════════
// LOCALSTORAGE PERSISTENCE
// ══════════════════════════════════════════
const STORAGE_KEY = 'lwh-state';

function persistState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      states, lmStates, currentLang, isDark
    }));
  } catch (e) { /* quota exceeded or private mode – silently ignore */ }
}

function restoreState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (saved.states) Object.assign(states, saved.states);
    if (saved.lmStates) Object.assign(lmStates, saved.lmStates);
    if (saved.currentLang && T[saved.currentLang]) {
      currentLang = saved.currentLang;
      document.documentElement.lang = currentLang;
      document.querySelectorAll('.lang-btn').forEach(b => {
        const isActive = b.textContent === currentLang.toUpperCase();
        b.classList.toggle('active', isActive);
        b.setAttribute('aria-pressed', isActive);
      });
    }
    if (typeof saved.isDark === 'boolean') {
      isDark = saved.isDark;
      document.body.classList.toggle('light', !isDark);
      const btn = document.getElementById('mode-btn');
      btn.querySelector('.mode-icon').textContent = isDark ? '☀️' : '🌙';
    }
    // Re-apply visual states to cards
    document.querySelectorAll('[data-id][data-state]').forEach(card => {
      const id = card.dataset.id;
      const s = states[id] || 'offen';
      card.className = 'card' + (s !== 'offen' ? ` state-${s}` : '');
      const btns = card.querySelectorAll('.toggle-btn, .choice-btn');
      btns.forEach(b => {
        b.classList.remove('active-ja', 'active-nein');
        b.setAttribute('aria-pressed', 'false');
      });
      if (s === 'ja' || s === 'nein') {
        const activeBtn = card.querySelector(`[data-value="${s}"]`);
        if (activeBtn) {
          activeBtn.classList.add(`active-${s}`);
          activeBtn.setAttribute('aria-pressed', 'true');
        }
      }
    });
  } catch (e) { /* corrupted data – ignore */ }
}

function resetAll() {
  Object.keys(states).forEach(k => delete states[k]);
  Object.keys(lmStates).forEach(k => delete lmStates[k]);
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  // Reset card visuals
  document.querySelectorAll('[data-id][data-state]').forEach(card => {
    card.className = 'card';
    card.querySelectorAll('.toggle-btn, .choice-btn').forEach(b => {
      b.classList.remove('active-ja', 'active-nein');
      b.setAttribute('aria-pressed', 'false');
    });
  });
  rebuildLMCards();
  updateCounts();
}

// ══════════════════════════════════════════
// TEXT GENERATION
// ══════════════════════════════════════════
function generateText() {
  const lang = T[currentLang];
  const eigenblutIds = EIGENBLUT_IDS;
  const fraktionIds = FRAKTION_IDS;

  const lmItemNames = {};
  (lang.lm_items || []).forEach(x => lmItemNames[x.id] = x.name);

  // Build card name map from DOM
  const nameMap = {};
  document.querySelectorAll('[data-id] .card-name').forEach(el => {
    const id = el.closest('[data-id]').dataset.id;
    nameMap[id] = el.textContent;
  });

  let hasOffen = false;
  const parts = [];

  // Helper
  function buildBlock(title, ids) {
    const ja = ids.filter(id => states[id] === 'ja');
    const nein = ids.filter(id => states[id] === 'nein');
    const open = ids.filter(id => !states[id] || states[id] === 'offen');
    if (!ja.length && !nein.length && !open.length) return null;
    let block = title + ':\n';
    if (ja.length) block += lang.txt_ja + ': ' + ja.map(id => nameMap[id] || id).join('; ') + '.\n';
    if (nein.length) block += lang.txt_nein + ': ' + nein.map(id => nameMap[id] || id).join('; ') + '.\n';
    if (open.length) { hasOffen = true; block += lang.txt_offen + ': ' + open.map(id => nameMap[id] || id).join('; ') + '.\n'; }
    return block.trimEnd();
  }

  const eb = buildBlock(lang.txt_eigenblut, eigenblutIds);
  if (eb) parts.push(eb);
  const fr = buildBlock(lang.txt_fraktionen, fraktionIds);
  if (fr) parts.push(fr);

  parts.push(lang.txt_blutspar + ':\n' + lang.txt_blutspar_detail);

  // LM
  const lmIds = (lang.lm_items || []).map(x => x.id);
  const scLabels = lang.sc_labels || { s1: 'S1', s2: 'S2', s3: 'S3' };
  let lmBlock = lang.txt_lm + ':\n';
  lmIds.forEach(id => {
    const name = lmItemNames[id] || id;
    const stObj = lmStates[id] || {};
    lmBlock += name + ':\n';
    ['s1','s2','s3'].forEach(sc => {
      const v = stObj[sc] || 'offen';
      if (v === 'offen') hasOffen = true;
      const vLabel = v === 'ja' ? (lang.yes) : v === 'nein' ? (lang.no) : '[OFFEN]';
      lmBlock += '  ' + scLabels[sc] + ': ' + vLabel + '\n';
    });
  });
  parts.push(lmBlock.trimEnd());
  parts.push(lang.txt_closing);

  return { text: parts.join('\n\n'), hasOffen };
}

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
let previouslyFocused = null;

function openModal(tab) {
  buildSummary();
  const { text, hasOffen } = generateText();
  document.getElementById('generated-text').textContent = text;
  document.getElementById('offen-warning').style.display = hasOffen ? 'block' : 'none';
  previouslyFocused = document.activeElement;
  const modal = document.getElementById('modal');
  modal.classList.add('open');
  switchTab(tab || 'text');
  // Focus the first focusable element inside the modal
  const firstFocusable = modal.querySelector('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
  if (firstFocusable) firstFocusable.focus();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'text') || (i === 1 && tab === 'summary'));
  });
  document.getElementById('tab-text').classList.toggle('active', tab === 'text');
  document.getElementById('tab-summary').classList.toggle('active', tab === 'summary');
}

function buildSummary() {
  const lang = T[currentLang];
  const fixedNein = document.querySelectorAll('[data-fixed="nein"]');
  const fixedJa = document.querySelectorAll('[data-fixed="ja"]');
  const choices = document.querySelectorAll('[data-state]');
  const fragment = document.createDocumentFragment();

  function createSection(title, items, stateClass, stateText) {
    const section = document.createElement('div');
    section.className = 'modal-section';
    const titleEl = document.createElement('div');
    titleEl.className = 'modal-section-title';
    titleEl.textContent = title;
    section.appendChild(titleEl);
    items.forEach(item => {
      const entry = document.createElement('div');
      entry.className = 'modal-entry';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'modal-entry-name';
      nameSpan.textContent = typeof item === 'string' ? item : (item.querySelector('.card-name')?.textContent || item.dataset.id);
      entry.appendChild(nameSpan);
      const stateSpan = document.createElement('span');
      stateSpan.className = 'modal-entry-state ' + stateClass;
      stateSpan.textContent = stateText;
      entry.appendChild(stateSpan);
      section.appendChild(entry);
    });
    return section;
  }

  // Fixed refusals (allogeneic blood)
  fragment.appendChild(createSection(lang.fix_nein_label, Array.from(fixedNein), 'state-text-nein', lang.no));

  // Categorize user choices
  const jaItems = [], neinItems = [], offenItems = [];
  choices.forEach(card => {
    const s = states[card.dataset.id] || 'offen';
    if (s === 'ja') jaItems.push(card);
    else if (s === 'nein') neinItems.push(card);
    else offenItems.push(card);
  });

  if (jaItems.length) fragment.appendChild(createSection(lang.accepted_label, jaItems, 'state-text-ja', lang.yes));
  if (neinItems.length) fragment.appendChild(createSection(lang.rejected_label, neinItems, 'state-text-nein', lang.no));
  if (offenItems.length) fragment.appendChild(createSection(lang.open_label, offenItems, 'state-text-offen', '–'));

  // Fixed accepted (non-blood products)
  fragment.appendChild(createSection(lang.fix_ja_label, Array.from(fixedJa), 'state-text-fix', '✓'));

  const target = document.getElementById('modal-content');
  target.innerHTML = '';
  target.appendChild(fragment);
}

function copyText() {
  const text = document.getElementById('generated-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ ' + (currentLang === 'de' ? 'Kopiert!' : currentLang === 'es' ? '¡Copiado!' : currentLang === 'fr' ? 'Copié!' : 'Copied!');
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  if (previouslyFocused) previouslyFocused.focus();
}

// ══════════════════════════════════════════
// EVENT DELEGATION
// ══════════════════════════════════════════

// Central click handler via data-action attributes
document.addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;

  switch (btn.dataset.action) {
    case 'toggle': {
      const card = btn.closest('[data-id]');
      if (!card) return;
      setState(card.dataset.id, btn.dataset.value, btn);
      break;
    }
    case 'open-modal':
      openModal(btn.dataset.tab);
      break;
    case 'close-modal':
      closeModal();
      break;
    case 'switch-tab':
      switchTab(btn.dataset.tab);
      break;
    case 'copy-text':
      copyText();
      break;
    case 'print':
      window.print();
      break;
    case 'reset':
      resetAll();
      break;
  }
});

// Language switcher delegation
document.querySelector('.lang-bar').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-lang]');
  if (btn) setLang(btn.dataset.lang);
});

// Mode toggle delegation
document.getElementById('mode-btn').addEventListener('click', toggleMode);

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// Keyboard: Escape closes modal + focus trap
document.addEventListener('keydown', function(e) {
  const modal = document.getElementById('modal');
  if (e.key === 'Escape' && modal.classList.contains('open')) {
    closeModal();
    return;
  }
  if (e.key === 'Tab' && modal.classList.contains('open')) {
    const focusable = modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    if (focusable.length === 0) return;
    const first = focusable[0];
    const last = focusable[focusable.length - 1];
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  }
});

// ── INIT ──
restoreState();
applyTranslations();
</script>
</body>
</html>
